<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Participant Scoreboard</title>
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <style>
            :root {
                --bg: #eef5f1;
                --card: #ffffff;
                --text: #173129;
                --muted: #5f756d;
                --accent: #1f7a5c;
                --accent-dark: #15553f;
                --border: #d4e2db;
                --surface: rgba(255, 255, 255, 0.9);
                --shadow: 0 18px 40px rgba(23, 49, 41, 0.12);
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                font-family: Arial, Helvetica, sans-serif;
                background: radial-gradient(
                    circle at top,
                    #f9fcfb 0%,
                    #edf5f1 42%,
                    #e3efe9 100%
                );
                color: var(--text);
                padding: 24px 16px 40px;
            }

            .page {
                width: min(1100px, 100%);
                margin: 0 auto;
            }

            .hero,
            .filters,
            .results {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 22px;
                box-shadow: var(--shadow);
            }

            .hero {
                margin-bottom: 18px;
                padding: 28px;
            }

            .hero h1 {
                margin: 0 0 8px;
                font-size: 2rem;
            }

            .page-title {
                margin: 0 0 12px;
                color: var(--accent);
                font-weight: 700;
                letter-spacing: 0.06em;
                text-transform: uppercase;
                font-size: 0.95rem;
            }

            .hero p {
                margin: 0;
                color: var(--muted);
                line-height: 1.55;
            }

            .filters {
                margin-bottom: 18px;
                padding: 22px;
            }

            .filters-grid {
                display: grid;
                grid-template-columns: 220px minmax(0, 1fr) auto;
                gap: 14px;
                align-items: end;
            }

            label {
                display: block;
                margin-bottom: 8px;
                font-weight: 700;
            }

            select,
            input,
            button {
                font: inherit;
            }

            select,
            input {
                width: 100%;
                padding: 12px 14px;
                border-radius: 12px;
                border: 1px solid #c6d6ce;
                background: #fff;
                color: var(--text);
                outline: none;
            }

            button {
                padding: 12px 16px;
                border: 0;
                border-radius: 12px;
                background: var(--accent);
                color: #fff;
                font-weight: 700;
                cursor: pointer;
            }

            .results {
                padding: 22px;
            }

            .results-header {
                display: flex;
                justify-content: space-between;
                gap: 12px;
                align-items: center;
                margin-bottom: 16px;
                color: var(--muted);
            }

            .scoreboard-list {
                display: grid;
                gap: 12px;
            }

            details.score-card {
                border: 1px solid var(--border);
                border-radius: 18px;
                background: #fbfefd;
                overflow: hidden;
            }

            .score-card summary {
                list-style: none;
                cursor: pointer;
                padding: 18px;
            }

            .score-card summary::-webkit-details-marker {
                display: none;
            }

            .summary-row {
                display: grid;
                grid-template-columns: minmax(0, 1fr) 130px 110px;
                gap: 16px;
                align-items: center;
            }

            .participant-cell {
                display: flex;
                align-items: center;
                gap: 14px;
                min-width: 0;
            }

            .avatar,
            .avatar img {
                width: 54px;
                height: 54px;
                border-radius: 50%;
            }

            .avatar {
                overflow: hidden;
                background: #e6f0eb;
                flex: 0 0 auto;
            }

            .avatar img {
                object-fit: cover;
                display: block;
            }

            .participant-name {
                font-weight: 700;
                font-size: 1rem;
            }

            .participant-meta {
                color: var(--muted);
                font-size: 0.92rem;
                line-height: 1.45;
            }

            .score-total {
                font-size: 1.35rem;
                font-weight: 700;
                color: var(--accent);
                text-align: right;
            }

            .expand-hint {
                color: var(--muted);
                font-weight: 700;
                text-align: right;
            }

            .score-details {
                border-top: 1px solid var(--border);
                padding: 0 18px 18px;
            }

            .score-details-row {
                display: flex;
                justify-content: space-between;
                gap: 16px;
                padding: 10px 0;
                border-top: 1px solid #e6efea;
            }

            .score-details-row:first-child {
                border-top: 0;
                padding-top: 14px;
            }

            .profile-link {
                margin-top: 14px;
                padding-top: 14px;
                border-top: 1px solid #e6efea;
            }

            .profile-link a {
                color: var(--accent-dark);
                font-weight: 700;
                text-decoration: none;
            }

            .pagination {
                display: flex;
                justify-content: space-between;
                gap: 12px;
                align-items: center;
                margin-top: 18px;
            }

            .pagination-controls {
                display: flex;
                gap: 10px;
            }

            .pagination button:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            .empty-message {
                padding: 24px 0 8px;
                color: var(--muted);
            }

            @media (max-width: 800px) {
                .filters-grid,
                .summary-row {
                    grid-template-columns: 1fr;
                }

                .score-total,
                .expand-hint {
                    text-align: left;
                }

                .pagination {
                    flex-direction: column;
                    align-items: flex-start;
                }
            }
        </style>
    </head>
    <body>
        <div class="page">
            <section class="hero">
                <div class="page-title">ECTS Innovation in Action 2026</div>
                <h1>Event Scoreboard</h1>
                <p>
                    View participant totals, filter by group, search by
                    participant code, name, or record id, and expand rows to see
                    individual scores.
                </p>
            </section>

            <section class="filters">
                <div class="filters-grid">
                    <div>
                        <label for="groupFilter">Group ID</label>
                        <select id="groupFilter">
                            <option value="">All groups</option>
                        </select>
                    </div>

                    <div>
                        <label for="searchInput">Search Participant</label>
                        <input
                            id="searchInput"
                            type="text"
                            placeholder="Search by name, participant code, or record id"
                        />
                    </div>

                    <div>
                        <button id="applyFilters" type="button">Apply</button>
                    </div>
                </div>
            </section>

            <section class="results">
                <div class="results-header">
                    <div id="resultsSummary">Loading participants...</div>
                    <div id="pageSummary"></div>
                </div>

                <div id="scoreboardList" class="scoreboard-list"></div>

                <div class="pagination">
                    <div id="paginationSummary"></div>
                    <div class="pagination-controls">
                        <button id="prevPage" type="button">Previous</button>
                        <button id="nextPage" type="button">Next</button>
                    </div>
                </div>
            </section>
        </div>

        <script>
            const groupFilter = document.getElementById("groupFilter");
            const searchInput = document.getElementById("searchInput");
            const applyFiltersButton = document.getElementById("applyFilters");
            const scoreboardList = document.getElementById("scoreboardList");
            const resultsSummary = document.getElementById("resultsSummary");
            const pageSummary = document.getElementById("pageSummary");
            const paginationSummary =
                document.getElementById("paginationSummary");
            const prevPageButton = document.getElementById("prevPage");
            const nextPageButton = document.getElementById("nextPage");

            const state = {
                page: 1,
                totalPages: 1,
                groupId: "",
                search: "",
                groupsLoaded: false,
            };

            async function fetchJson(url) {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(
                        `Request failed with status ${response.status}`,
                    );
                }
                return response.json();
            }

            function renderItems(items) {
                if (!items.length) {
                    scoreboardList.innerHTML =
                        '<div class="empty-message">No participants matched the current filters.</div>';
                    return;
                }

                scoreboardList.innerHTML = items
                    .map((participant) => {
                        const fullName =
                            `${participant.firstName || ""} ${participant.lastName || ""}`.trim() ||
                            "(No name yet)";
                        const detailRows = participant.stats
                            .map(
                                (stat) => `
                                    <div class="score-details-row">
                                        <span>${stat.title}</span>
                                        <strong>${stat.value}</strong>
                                    </div>
                                `,
                            )
                            .join("");

                        return `
                            <details class="score-card">
                                <summary>
                                    <div class="summary-row">
                                        <div class="participant-cell">
                                            <div class="avatar">
                                                ${
                                                    participant.logo
                                                        ? `<img src="${participant.logo}" alt="${fullName} logo" />`
                                                        : ""
                                                }
                                            </div>
                                            <div>
                                                <div class="participant-name">${fullName}</div>
                                                <div class="participant-meta">
                                                    Group: ${participant.groupId || "-"}<br />
                                                    Participant Code: ${participant.participantCode || "-"}
                                                </div>
                                            </div>
                                        </div>
                                        <div class="score-total">${participant.totalScore}</div>
                                        <div class="expand-hint">Show scores</div>
                                    </div>
                                </summary>
                                <div class="score-details">
                                    ${detailRows}
                                    <div class="profile-link">
                                        <a href="/participants/${participant.id}/stats">View participant profile</a>
                                    </div>
                                </div>
                            </details>
                        `;
                    })
                    .join("");
            }

            function updatePagination(response) {
                state.page = response.page;
                state.totalPages = response.totalPages;
                resultsSummary.textContent = `${response.totalItems} participant(s) found`;
                pageSummary.textContent = `Page ${response.page} of ${response.totalPages}`;
                paginationSummary.textContent = `Showing up to ${response.pageSize} participants per page`;
                prevPageButton.disabled = response.page <= 1;
                nextPageButton.disabled = response.page >= response.totalPages;

                if (!state.groupsLoaded) {
                    for (const groupId of response.groupIds || []) {
                        const option = document.createElement("option");
                        option.value = groupId;
                        option.textContent = groupId;
                        groupFilter.appendChild(option);
                    }
                    groupFilter.value = state.groupId;
                    state.groupsLoaded = true;
                }
            }

            async function loadPage(page = 1) {
                state.page = page;
                const params = new URLSearchParams({
                    page: String(page),
                });

                if (state.groupId) {
                    params.set("groupId", state.groupId);
                }
                if (state.search) {
                    params.set("search", state.search);
                }

                resultsSummary.textContent = "Loading participants...";
                scoreboardList.innerHTML = "";

                try {
                    const response = await fetchJson(
                        `/api/public/scoreboard?${params.toString()}`,
                    );
                    renderItems(response.items || []);
                    updatePagination(response);
                } catch (error) {
                    scoreboardList.innerHTML =
                        '<div class="empty-message">Unable to load the scoreboard right now.</div>';
                    resultsSummary.textContent =
                        error.message || "Error loading scoreboard.";
                }
            }

            applyFiltersButton.addEventListener("click", () => {
                state.groupId = groupFilter.value;
                state.search = searchInput.value.trim();
                loadPage(1);
            });

            searchInput.addEventListener("keydown", (event) => {
                if (event.key === "Enter") {
                    state.groupId = groupFilter.value;
                    state.search = searchInput.value.trim();
                    loadPage(1);
                }
            });

            prevPageButton.addEventListener("click", () => {
                if (state.page > 1) {
                    loadPage(state.page - 1);
                }
            });

            nextPageButton.addEventListener("click", () => {
                if (state.page < state.totalPages) {
                    loadPage(state.page + 1);
                }
            });

            loadPage(1);
        </script>
    </body>
</html>
