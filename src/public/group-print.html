<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Group Participant Print View</title>
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <style>
            :root {
                --bg: #eef5f1;
                --card: #ffffff;
                --text: #173129;
                --muted: #5f756d;
                --accent: #1f7a5c;
                --accent-dark: #15553f;
                --border: #d4e2db;
                --surface: rgba(255, 255, 255, 0.9);
                --shadow: 0 18px 40px rgba(23, 49, 41, 0.12);
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                font-family: Arial, Helvetica, sans-serif;
                background:
                    radial-gradient(circle at top, #f9fcfb 0%, #edf5f1 42%, #e3efe9 100%);
                color: var(--text);
            }

            .site-shell {
                width: min(1200px, calc(100% - 32px));
                margin: 0 auto;
                padding: 24px 0 0;
            }

            .navbar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 16px;
                margin-bottom: 24px;
                padding: 16px 18px;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 18px;
                box-shadow: 0 10px 26px rgba(23, 49, 41, 0.08);
            }

            .brand-block h1 {
                margin: 0 0 4px;
                font-size: 1.25rem;
                color: var(--text);
            }

            .brand-block p {
                margin: 0;
                color: var(--muted);
                font-size: 0.93rem;
            }

            .nav-links {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
            }

            .nav-links a {
                text-decoration: none;
                color: var(--accent-dark);
                background: #edf6f1;
                border-radius: 999px;
                padding: 10px 14px;
                font-weight: bold;
            }

            .page {
                max-width: 9in;
                margin: 0 auto;
                padding: 0 20px 28px;
            }

            .controls {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 22px;
                padding: 22px;
                margin-bottom: 20px;
                box-shadow: var(--shadow);
            }

            .controls h1 {
                margin-top: 0;
                margin-bottom: 16px;
                font-size: 1.9rem;
                line-height: 1.15;
            }

            .control-row {
                display: flex;
                flex-wrap: wrap;
                gap: 14px 20px;
                align-items: center;
                margin-bottom: 12px;
            }

            .control-row:last-child {
                margin-bottom: 0;
            }

            label {
                font-weight: bold;
            }

            select,
            button {
                font: inherit;
                padding: 10px 12px;
                border-radius: 12px;
                border: 1px solid #c6d6ce;
                background: #ffffff;
                color: var(--text);
            }

            select:focus,
            button:focus {
                outline: none;
                border-color: var(--accent);
                box-shadow: 0 0 0 4px rgba(31, 122, 92, 0.12);
            }

            .toggle-group {
                display: flex;
                gap: 16px;
                flex-wrap: wrap;
                align-items: center;
            }

            .toggle-group label {
                font-weight: normal;
                display: inline-flex;
                align-items: center;
                gap: 6px;
            }

            .status {
                margin-top: 12px;
                color: var(--muted);
                font-size: 0.95rem;
            }

            .print-area {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 22px;
                padding: 20px;
                box-shadow: var(--shadow);
            }

            .group-title {
                margin: 0 0 14px 0;
                font-size: 1.35rem;
            }

            .participant-grid {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 16px;
                align-items: start;
            }

            body.low-waste-print .participant-grid {
                grid-template-columns: repeat(auto-fill, minmax(1in, 1in));
                gap: 0.25in;
                justify-content: start;
            }

            .participant-card {
                /*border: 1px solid #d9dfe6;*/
                border-radius: 8px;
                padding: 10px;
                text-align: center;
                background: #fff;
                overflow: hidden;
                page-break-inside: avoid;
                break-inside: avoid;
                box-shadow: inset 0 0 0 1px rgba(212, 226, 219, 0.9);
            }

            body.low-waste-print .participant-card {
                padding: 0;
                background: transparent;
                box-shadow: none;
                border-radius: 0;
            }

            .logo-wrap {
                width: 1in;
                margin: 0 auto 10px auto;
            }

            body.low-waste-print .logo-wrap {
                margin: 0;
            }

            .participant-logo {
                width: 1in;
                height: 1in;
                object-fit: cover;
                display: block;
                /*    border: 1px solid #bbb;
                background: #eee;
                
            */
                border-radius: 50%;
            }

            .participant-name {
                font-weight: bold;
                font-size: 0.95rem;
                min-height: 2.5em;
                margin-bottom: 8px;
                word-break: break-word;
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
            }

            .participant-stats {
                text-align: left;
                font-size: 0.8rem;
                line-height: 1.35;
            }

            .participant-stats div {
                margin-bottom: 2px;
            }

            .visibility-hidden {
                visibility: hidden !important;
            }

            .hidden {
                display: none !important;
            }

            body.low-waste-print .participant-name,
            body.low-waste-print .participant-stats {
                display: none !important;
            }

            .empty-message {
                padding: 20px 0;
                color: var(--muted);
            }

            @media (max-width: 900px) {
                .participant-grid {
                    grid-template-columns: repeat(3, 1fr);
                }
            }

            @media (max-width: 700px) {
                .navbar {
                    flex-direction: column;
                    align-items: flex-start;
                }

                .participant-grid {
                    grid-template-columns: repeat(2, 1fr);
                }
            }

            @media print {
                @page {
                    size: auto;
                    margin: 0.5in;
                }

                body {
                    background: #fff;
                }

                .page {
                    max-width: none;
                    padding: 0;
                    margin: 0;
                }

                .site-shell,
                .controls,
                .group-title {
                    display: none;
                }

                .print-area {
                    border: none;
                    border-radius: 0;
                    padding: 0;
                }

                .participant-grid {
                    grid-template-columns: repeat(4, 1fr);
                    gap: 12px;
                }

                body.low-waste-print .participant-grid {
                    grid-template-columns: repeat(6, 1in);
                    gap: 0.25in;
                    justify-content: start;
                }
                /*
                .participant-card {
                    border: 1px solid #aaa;
                }
 */
            }
        </style>
    </head>
    <body>
        <div class="site-shell">
            <nav class="navbar" aria-label="Main navigation">
                <div class="brand-block">
                    <h1>ECTS Backpack Challenge 2026</h1>
                    <p>Participant print tools</p>
                </div>
                <div class="nav-links">
                    <a href="/">Home</a>
                    <a href="/score-events">Event Scoring</a>
                    <a href="/laser">Group Print View</a>
                    <a href="/create-logo">Logo Creator</a>
                </div>
            </nav>
        </div>
        <div class="page">
            <div class="controls">
                <h1>Group Participant Print View</h1>

                <div class="control-row">
                    <label for="groupSelect">Group:</label>
                    <select id="groupSelect">
                        <option value="">Loading groups...</option>
                    </select>

                    <button id="printBtn" type="button">Print</button>
                    <button id="saveWordBtn" type="button">
                        Save to Word (.docx)
                    </button>
                    <button id="exportSvgBtn" type="button">
                        Export SVG for Laser
                    </button>
                </div>

                <div class="control-row">
                    <div class="toggle-group">
                        <label>
                            <input type="checkbox" id="toggleNames" />
                            Show names
                        </label>

                        <label>
                            <input type="checkbox" id="toggleStats" />
                            Show stats
                        </label>

                        <label>
                            <input type="checkbox" id="toggleLowWaste" />
                            Low-waste print view
                        </label>
                    </div>
                </div>

                <div class="status" id="statusMessage">
                    Loading participants...
                </div>
            </div>

            <div class="print-area">
                <h2 class="group-title" id="groupTitle">Select a group</h2>
                <div id="participantContainer">
                    <div class="empty-message">No group selected yet.</div>
                </div>
            </div>
        </div>

        <script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
        <script>
            const groupSelect = document.getElementById("groupSelect");
            const toggleNames = document.getElementById("toggleNames");
            const toggleStats = document.getElementById("toggleStats");
            const toggleLowWaste = document.getElementById("toggleLowWaste");
            const printBtn = document.getElementById("printBtn");
            const saveWordBtn = document.getElementById("saveWordBtn");
            const exportSvgBtn = document.getElementById("exportSvgBtn");
            const statusMessage = document.getElementById("statusMessage");
            const groupTitle = document.getElementById("groupTitle");
            const participantContainer = document.getElementById(
                "participantContainer",
            );
            let activityMetadata = [];
            let activityTitleByKey = {};

            async function fetchJson(url) {
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error(
                        `Request failed: ${response.status} ${response.statusText}`,
                    );
                }

                return response.json();
            }

            async function loadGroupIds() {
                statusMessage.textContent =
                    "Loading participants to build group list...";

                const groupIds = await fetchJson("/api/participants/groups");
                groupSelect.innerHTML = "";

                const defaultOption = document.createElement("option");
                defaultOption.value = "";
                defaultOption.textContent = "Select a group";
                groupSelect.appendChild(defaultOption);

                for (const groupId of groupIds) {
                    const option = document.createElement("option");
                    option.value = groupId;
                    option.textContent = groupId;
                    groupSelect.appendChild(option);
                }

                statusMessage.textContent = groupIds.length
                    ? "Select a group to load participants."
                    : "No group IDs found.";
            }

            async function loadActivityMetadata() {
                const metadata = await fetchJson("/api/activities/metadata");
                activityMetadata = Array.isArray(metadata.visibleActivities)
                    ? metadata.visibleActivities
                    : Array.isArray(metadata.activities)
                      ? metadata.activities.filter(
                            (activity) =>
                                typeof activity?.title === "string" &&
                                activity.title.trim() !== "",
                        )
                    : [];
                activityTitleByKey =
                    metadata && typeof metadata.titleByKey === "object"
                        ? metadata.titleByKey
                        : {};
            }

            function buildStatHtml(stats = {}) {
                const keys = activityMetadata.length
                    ? activityMetadata.map((activity) => activity.key)
                    : Object.keys(activityTitleByKey);

                return keys
                    .map((key) => {
                        const value =
                            typeof stats[key] === "number" ? stats[key] : 0;
                        const title = activityTitleByKey[key];
                        if (!title) {
                            return "";
                        }
                        return `<div><strong>${title}:</strong> ${value}</div>`;
                    })
                    .join("");
            }

            function renderParticipants(groupId, participants) {
                groupTitle.textContent = groupId
                    ? `Group: ${groupId}`
                    : "Select a group";

                if (!participants.length) {
                    participantContainer.innerHTML = `
          <div class="empty-message">No participants found for this group.</div>
        `;
                    return;
                }

                participantContainer.innerHTML = `
        <div class="participant-grid">
          ${participants
              .map((participant) => {
                  const fullName =
                      `${participant.firstName || ""} ${participant.lastName || ""}`.trim();
                  const safeName = fullName || "Unnamed Participant";
                  const logo = participant.logo || "";

                  return `
              <div class="participant-card">
                <div class="logo-wrap">
                  ${
                      logo
                          ? `<img class="participant-logo" src="${logo}" alt="${safeName} logo" />`
                          : `<div class="participant-logo"></div>`
                  }
                </div>

                <div class="participant-name ${toggleNames.checked ? "" : "visibility-hidden"}">
                  ${safeName}
                </div>

                <div class="participant-stats ${toggleStats.checked ? "" : "hidden"}">
                  ${buildStatHtml(participant.stats)}
                </div>
              </div>
            `;
              })
              .join("")}
        </div>
      `;
            }

            async function loadParticipantsForGroup(groupId) {
                if (!groupId) {
                    groupTitle.textContent = "Select a group";
                    participantContainer.innerHTML = `
          <div class="empty-message">No group selected yet.</div>
        `;
                    statusMessage.textContent =
                        "Select a group to load participants.";
                    return;
                }

                try {
                    statusMessage.textContent = `Loading participants for ${groupId}...`;

                    const participants = await fetchJson(
                        `/api/participants/group/${encodeURIComponent(groupId)}`,
                    );
                    renderParticipants(groupId, participants);

                    statusMessage.textContent = `${participants.length} participant(s) loaded for ${groupId}.`;
                } catch (error) {
                    console.error(error);
                    participantContainer.innerHTML = `
          <div class="empty-message">Could not load participants for this group.</div>
        `;
                    statusMessage.textContent = "Error loading participants.";
                }
            }

            function refreshVisibility() {
                const lowWaste = toggleLowWaste.checked;
                document.body.classList.toggle("low-waste-print", lowWaste);
                toggleNames.disabled = lowWaste;
                toggleStats.disabled = lowWaste;

                document.querySelectorAll(".participant-name").forEach((el) => {
                    el.classList.toggle(
                        "visibility-hidden",
                        lowWaste || !toggleNames.checked,
                    );
                });

                document
                    .querySelectorAll(".participant-stats")
                    .forEach((el) => {
                        el.classList.toggle(
                            "hidden",
                            lowWaste || !toggleStats.checked,
                        );
                    });
            }

            function getPrintMarkup() {
                const printAreaClone = document
                    .querySelector(".print-area")
                    .cloneNode(true);
                const wrapper = document.createElement("div");
                wrapper.appendChild(printAreaClone);

                return `<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>${groupTitle.textContent || "Group Participant Print View"}</title>
        <style>
            @page {
                size: auto;
                margin: 0.5in;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                font-family: Arial, sans-serif;
                color: #222;
                background: #fff;
            }

            .print-area {
                border: none;
                border-radius: 0;
                padding: 0;
            }

            .group-title {
                display: none;
            }

            .participant-grid {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 12px;
                align-items: start;
                width: 100%;
            }

            body.low-waste-print .participant-grid,
            .low-waste-print .participant-grid {
                grid-template-columns: repeat(6, 1in);
                gap: 0.25in;
                justify-content: start;
            }

            .participant-card {
                border-radius: 8px;
                padding: 10px;
                text-align: center;
                background: #fff;
                overflow: hidden;
                page-break-inside: avoid;
                break-inside: avoid;
            }

            body.low-waste-print .participant-card,
            .low-waste-print .participant-card {
                padding: 0;
                background: transparent;
                border-radius: 0;
            }

            .logo-wrap {
                width: 1in;
                margin: 0 auto 10px auto;
            }

            body.low-waste-print .logo-wrap,
            .low-waste-print .logo-wrap {
                margin: 0;
            }

            .participant-logo {
                width: 1in;
                height: 1in;
                object-fit: cover;
                display: block;
                border-radius: 50%;
            }

            .participant-name {
                font-weight: bold;
                font-size: 0.95rem;
                min-height: 2.5em;
                margin-bottom: 8px;
                word-break: break-word;
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
            }

            .participant-stats {
                text-align: left;
                font-size: 0.8rem;
                line-height: 1.35;
            }

            .participant-stats div {
                margin-bottom: 2px;
            }

            .visibility-hidden {
                visibility: hidden !important;
            }

            .hidden {
                display: none !important;
            }

            body.low-waste-print .participant-name,
            body.low-waste-print .participant-stats,
            .low-waste-print .participant-name,
            .low-waste-print .participant-stats {
                display: none !important;
            }

            .empty-message {
                padding: 20px 0;
                color: #666;
            }
        </style>
    </head>
    <body>
        ${wrapper.innerHTML}
    </body>
</html>`;
            }

            function inchesToTwip(inches) {
                return Math.round(inches * 1440);
            }

            function pxToMm(px) {
                return (px * 25.4) / 96;
            }

            function formatSvgNumber(value) {
                return Number(value.toFixed(3));
            }

            function escapeXml(value = "") {
                return String(value)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&apos;");
            }

            function stripHtml(text = "") {
                return String(text).replace(/<[^>]+>/g, "");
            }

            async function imageSrcToDataUrl(src) {
                if (!src) {
                    return null;
                }

                if (src.startsWith("data:")) {
                    return src;
                }

                const response = await fetch(src);
                if (!response.ok) {
                    throw new Error(
                        `Image request failed: ${response.status} ${response.statusText}`,
                    );
                }

                const blob = await response.blob();
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = () =>
                        reject(
                            new Error(
                                "Failed to convert image to embedded SVG data.",
                            ),
                        );
                    reader.readAsDataURL(blob);
                });
            }

            function wrapSvgText(text, maxWidthMm, fontPx, fontWeight = "400") {
                const normalized = String(text || "").trim().replace(/\s+/g, " ");
                if (!normalized) {
                    return [];
                }

                const canvas = document.createElement("canvas");
                const ctx = canvas.getContext("2d");
                ctx.font = `${fontWeight} ${fontPx}px Arial`;
                const maxWidthPx = (maxWidthMm * 96) / 25.4;
                const words = normalized.split(" ");
                const lines = [];
                let current = "";

                for (const word of words) {
                    const candidate = current ? `${current} ${word}` : word;
                    if (
                        current &&
                        ctx.measureText(candidate).width > maxWidthPx
                    ) {
                        lines.push(current);
                        current = word;
                    } else {
                        current = candidate;
                    }
                }

                if (current) {
                    lines.push(current);
                }

                return lines;
            }

            function buildSvgTextBlock({
                textLines = [],
                xMm,
                yMm,
                widthMm,
                fontPx,
                fontWeight = "400",
                fill = "#000000",
                lineHeightMultiplier = 1.25,
            }) {
                if (!textLines.length) {
                    return "";
                }

                const fontSizeMm = pxToMm(fontPx);
                const lineHeightMm = fontSizeMm * lineHeightMultiplier;
                const centerMm = xMm + widthMm / 2;

                return `
                    <text
                        x="${formatSvgNumber(centerMm)}"
                        y="${formatSvgNumber(yMm + fontSizeMm)}"
                        text-anchor="middle"
                        font-family="Arial, Helvetica, sans-serif"
                        font-size="${formatSvgNumber(fontSizeMm)}mm"
                        font-weight="${escapeXml(fontWeight)}"
                        fill="${escapeXml(fill)}"
                    >
                        ${textLines
                            .map(
                                (line, index) => `
                                    <tspan
                                        x="${formatSvgNumber(centerMm)}"
                                        dy="${index === 0 ? 0 : formatSvgNumber(lineHeightMm)}mm"
                                    >${escapeXml(line)}</tspan>
                                `,
                            )
                            .join("")}
                    </text>
                `;
            }

            function dataUrlToUint8Array(dataUrl) {
                const base64 = dataUrl.split(",")[1] || "";
                const binary = atob(base64);
                const bytes = new Uint8Array(binary.length);

                for (let i = 0; i < binary.length; i += 1) {
                    bytes[i] = binary.charCodeAt(i);
                }

                return bytes;
            }

            function loadImageElement(src) {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.onerror = () =>
                        reject(
                            new Error("Failed to load image for Word export."),
                        );
                    img.src = src;
                });
            }

            async function imageSrcToBytes(src, options = {}) {
                if (!src) {
                    return null;
                }

                const {
                    outputSize = 300,
                    circular = true,
                    backgroundColor = "#FFFFFF",
                } = options;

                const img = await loadImageElement(src);
                const sourceWidth = img.naturalWidth || img.width || outputSize;
                const sourceHeight =
                    img.naturalHeight || img.height || outputSize;

                const canvas = document.createElement("canvas");
                canvas.width = outputSize;
                canvas.height = outputSize;

                const ctx = canvas.getContext("2d");
                ctx.fillStyle = backgroundColor;
                ctx.fillRect(0, 0, outputSize, outputSize);

                if (circular) {
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(
                        outputSize / 2,
                        outputSize / 2,
                        outputSize / 2,
                        0,
                        Math.PI * 2,
                    );
                    ctx.closePath();
                    ctx.clip();
                }

                const scale = Math.max(
                    outputSize / sourceWidth,
                    outputSize / sourceHeight,
                );
                const drawWidth = sourceWidth * scale;
                const drawHeight = sourceHeight * scale;
                const dx = (outputSize - drawWidth) / 2;
                const dy = (outputSize - drawHeight) / 2;

                ctx.drawImage(img, dx, dy, drawWidth, drawHeight);

                if (circular) {
                    ctx.restore();
                }

                const opaqueDataUrl = canvas.toDataURL("image/png");
                return dataUrlToUint8Array(opaqueDataUrl);
            }

            async function saveToWord() {
                try {
                    const docxLib = window.docx;

                    if (!docxLib || !docxLib.Document || !docxLib.Packer) {
                        throw new Error("docx library failed to load.");
                    }

                    const {
                        Document,
                        Packer,
                        Paragraph,
                        Table,
                        TableRow,
                        TableCell,
                        WidthType,
                        AlignmentType,
                        VerticalAlign,
                        HeadingLevel,
                        TextRun,
                        ImageRun,
                        BorderStyle,
                    } = docxLib;

                    const showNames = toggleNames.checked;
                    const showStats = toggleStats.checked;
                    const lowWaste = toggleLowWaste.checked;
                    const cards = Array.from(
                        document.querySelectorAll(".participant-card"),
                    );

                    const rows = [];
                    const columnsPerRow = lowWaste ? 6 : 4;
                    for (let i = 0; i < cards.length; i += columnsPerRow) {
                        rows.push(cards.slice(i, i + columnsPerRow));
                    }

                    const tableRows = [];

                    for (const rowCards of rows) {
                        const cells = await Promise.all(
                            rowCards.map(async (card) => {
                                const children = [];
                                const img = card.querySelector(
                                    ".participant-logo[src]",
                                );

                                if (img) {
                                    try {
                                        const imageBytes =
                                            await imageSrcToBytes(img.src, {
                                                outputSize: 300,
                                                circular: true,
                                                backgroundColor: "#FFFFFF",
                                            });

                                        if (imageBytes) {
                                            children.push(
                                                new Paragraph({
                                                    alignment:
                                                        AlignmentType.CENTER,
                                                    spacing: {
                                                        after: lowWaste ? 0 : 120,
                                                    },
                                                    children: [
                                                        new ImageRun({
                                                            data: imageBytes,
                                                            transformation: {
                                                                width: 96,
                                                                height: 96,
                                                            },
                                                        }),
                                                    ],
                                                }),
                                            );
                                        }
                                    } catch (imageError) {
                                        console.error(imageError);
                                        children.push(
                                            new Paragraph({
                                                alignment: AlignmentType.CENTER,
                                                spacing: {
                                                    after: lowWaste ? 0 : 120,
                                                },
                                                children: [new TextRun(" ")],
                                            }),
                                        );
                                    }
                                } else {
                                    children.push(
                                        new Paragraph({
                                            alignment: AlignmentType.CENTER,
                                            spacing: {
                                                after: lowWaste ? 0 : 120,
                                            },
                                            children: [new TextRun(" ")],
                                        }),
                                    );
                                }

                                if (!lowWaste && showNames) {
                                    const nameText =
                                        card
                                            .querySelector(".participant-name")
                                            ?.textContent?.trim() ||
                                        "Unnamed Participant";

                                    children.push(
                                        new Paragraph({
                                            alignment: AlignmentType.CENTER,
                                            spacing: { after: 100 },
                                            children: [
                                                new TextRun({
                                                    text: nameText,
                                                    bold: true,
                                                    size: 19,
                                                }),
                                            ],
                                        }),
                                    );
                                } else if (!lowWaste) {
                                    children.push(
                                        new Paragraph({
                                            alignment: AlignmentType.CENTER,
                                            spacing: { after: 100 },
                                            children: [
                                                new TextRun({
                                                    text: " ",
                                                    bold: true,
                                                    size: 19,
                                                }),
                                            ],
                                        }),
                                    );
                                }

                                if (!lowWaste && showStats) {
                                    const statLines = Array.from(
                                        card.querySelectorAll(
                                            ".participant-stats div",
                                        ),
                                    ).map((el) => el.textContent.trim());

                                    statLines.forEach((line, index) => {
                                        children.push(
                                            new Paragraph({
                                                alignment: AlignmentType.LEFT,
                                                spacing: {
                                                    after:
                                                        index ===
                                                        statLines.length - 1
                                                            ? 0
                                                            : 40,
                                                },
                                                children: [
                                                    new TextRun({
                                                        text: line,
                                                        size: 16,
                                                    }),
                                                ],
                                            }),
                                        );
                                    });
                                }

                                return new TableCell({
                                    width: {
                                        size: lowWaste ? 100 / columnsPerRow : 25,
                                        type: WidthType.PERCENTAGE,
                                    },
                                    verticalAlign: VerticalAlign.TOP,
                                    margins: {
                                        top: 0,
                                        right: lowWaste ? 0 : 100,
                                        bottom: lowWaste ? 360 : 100,
                                        left: 0,
                                    },
                                    borders: {
                                        top: {
                                            style: BorderStyle.NONE,
                                            size: 0,
                                            color: "FFFFFF",
                                        },
                                        bottom: {
                                            style: BorderStyle.NONE,
                                            size: 0,
                                            color: "FFFFFF",
                                        },
                                        left: {
                                            style: BorderStyle.NONE,
                                            size: 0,
                                            color: "FFFFFF",
                                        },
                                        right: {
                                            style: BorderStyle.NONE,
                                            size: 0,
                                            color: "FFFFFF",
                                        },
                                    },
                                    children,
                                });
                            }),
                        );

                        while (cells.length < columnsPerRow) {
                            cells.push(
                                new TableCell({
                                    width: {
                                        size: lowWaste ? 100 / columnsPerRow : 25,
                                        type: WidthType.PERCENTAGE,
                                    },
                                    borders: {
                                        top: {
                                            style: BorderStyle.NONE,
                                            size: 0,
                                            color: "FFFFFF",
                                        },
                                        bottom: {
                                            style: BorderStyle.NONE,
                                            size: 0,
                                            color: "FFFFFF",
                                        },
                                        left: {
                                            style: BorderStyle.NONE,
                                            size: 0,
                                            color: "FFFFFF",
                                        },
                                        right: {
                                            style: BorderStyle.NONE,
                                            size: 0,
                                            color: "FFFFFF",
                                        },
                                    },
                                    children: [new Paragraph("")],
                                }),
                            );
                        }

                        tableRows.push(
                            new TableRow({
                                cantSplit: true,
                                children: cells,
                            }),
                        );
                    }

                    const doc = new Document({
                        sections: [
                            {
                                properties: {
                                    page: {
                                        margin: {
                                            top: inchesToTwip(0.5),
                                            right: inchesToTwip(0.5),
                                            bottom: inchesToTwip(0.5),
                                            left: inchesToTwip(0.5),
                                        },
                                    },
                                },
                                children: [
                                    new Table({
                                        width: {
                                            size: 100,
                                            type: WidthType.PERCENTAGE,
                                        },
                                        borders: {
                                            top: {
                                                style: BorderStyle.NONE,
                                                size: 0,
                                                color: "FFFFFF",
                                            },
                                            bottom: {
                                                style: BorderStyle.NONE,
                                                size: 0,
                                                color: "FFFFFF",
                                            },
                                            left: {
                                                style: BorderStyle.NONE,
                                                size: 0,
                                                color: "FFFFFF",
                                            },
                                            right: {
                                                style: BorderStyle.NONE,
                                                size: 0,
                                                color: "FFFFFF",
                                            },
                                            insideHorizontal: {
                                                style: BorderStyle.NONE,
                                                size: 0,
                                                color: "FFFFFF",
                                            },
                                            insideVertical: {
                                                style: BorderStyle.NONE,
                                                size: 0,
                                                color: "FFFFFF",
                                            },
                                        },
                                        rows: tableRows,
                                    }),
                                ],
                            },
                        ],
                    });

                    const blob = await Packer.toBlob(doc);
                    const groupName =
                        (groupSelect.value || "group-participants")
                            .toString()
                            .trim()
                            .replace(/[^a-z0-9-_]+/gi, "_")
                            .replace(/^_+|_+$/g, "") || "group-participants";

                    const link = document.createElement("a");
                    const objectUrl = URL.createObjectURL(blob);
                    link.href = objectUrl;
                    link.download = `${groupName}.docx`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);

                    setTimeout(() => URL.revokeObjectURL(objectUrl), 1000);
                    statusMessage.textContent = "Word document downloaded.";
                } catch (error) {
                    console.error(error);
                    statusMessage.textContent = "Error creating Word document.";
                }
            }

            async function exportLaserSvg() {
                const grid = document.querySelector(".participant-grid");
                const cards = Array.from(
                    document.querySelectorAll(".participant-card"),
                );
                const groupId = (groupSelect.value || "").trim();

                if (!groupId || !grid || !cards.length) {
                    statusMessage.textContent =
                        "Load a group before exporting an SVG.";
                    return;
                }

                try {
                    statusMessage.textContent =
                        "Building SVG laser export...";

                    const gridRect = grid.getBoundingClientRect();
                    const cutRadiusMm = 13.5;
                    const cutRadiusPx = (cutRadiusMm * 96) / 25.4;
                    let minLeftPx = 0;
                    let minTopPx = 0;
                    let maxRightPx = gridRect.width;
                    let maxBottomPx = gridRect.height;
                    const engraveParts = [];
                    const cutParts = [];
                    const defs = [];

                    for (const [index, card] of cards.entries()) {
                        const logo = card.querySelector(".participant-logo[src]");
                        const logoWrap = card.querySelector(".logo-wrap");
                        const cardRect = card.getBoundingClientRect();
                        const logoRect =
                            (logo || logoWrap)?.getBoundingClientRect() || null;

                        const cardX = pxToMm(cardRect.left - gridRect.left);
                        const cardY = pxToMm(cardRect.top - gridRect.top);
                        const cardWidth = pxToMm(cardRect.width);

                        if (logoRect) {
                            const centerXPx =
                                logoRect.left -
                                gridRect.left +
                                logoRect.width / 2;
                            const centerYPx =
                                logoRect.top - gridRect.top + logoRect.height / 2;
                            const centerX = pxToMm(centerXPx);
                            const centerY = pxToMm(centerYPx);
                            const clipRadiusMm = pxToMm(
                                Math.min(logoRect.width, logoRect.height) / 2,
                            );
                            const clipId = `logo-clip-${index}`;

                            minLeftPx = Math.min(
                                minLeftPx,
                                centerXPx - cutRadiusPx,
                            );
                            minTopPx = Math.min(
                                minTopPx,
                                centerYPx - cutRadiusPx,
                            );
                            maxRightPx = Math.max(
                                maxRightPx,
                                centerXPx + cutRadiusPx,
                            );
                            maxBottomPx = Math.max(
                                maxBottomPx,
                                centerYPx + cutRadiusPx,
                            );

                            defs.push(`
                                <clipPath id="${clipId}">
                                    <circle
                                        cx="${formatSvgNumber(centerX)}"
                                        cy="${formatSvgNumber(centerY)}"
                                        r="${formatSvgNumber(clipRadiusMm)}"
                                    />
                                </clipPath>
                            `);

                            if (logo) {
                                const href = await imageSrcToDataUrl(logo.src);
                                engraveParts.push(`
                                    <image
                                        x="${formatSvgNumber(pxToMm(logoRect.left - gridRect.left))}"
                                        y="${formatSvgNumber(pxToMm(logoRect.top - gridRect.top))}"
                                        width="${formatSvgNumber(pxToMm(logoRect.width))}"
                                        height="${formatSvgNumber(pxToMm(logoRect.height))}"
                                        preserveAspectRatio="xMidYMid slice"
                                        clip-path="url(#${clipId})"
                                        href="${escapeXml(href)}"
                                    />
                                `);
                            }

                            cutParts.push(`
                                <circle
                                    cx="${formatSvgNumber(centerX)}"
                                    cy="${formatSvgNumber(centerY)}"
                                    r="${formatSvgNumber(cutRadiusMm)}"
                                    fill="none"
                                    stroke="#FF0000"
                                    stroke-width="0.2"
                                    vector-effect="non-scaling-stroke"
                                    class="cut-path"
                                    data-operation="cut"
                                />
                            `);
                        }

                        if (!toggleLowWaste.checked && toggleNames.checked) {
                            const nameEl = card.querySelector(".participant-name");
                            if (nameEl) {
                                const nameRect = nameEl.getBoundingClientRect();
                                const fontPx = parseFloat(
                                    window.getComputedStyle(nameEl).fontSize,
                                );
                                const lines = wrapSvgText(
                                    nameEl.textContent.trim(),
                                    pxToMm(nameRect.width),
                                    fontPx,
                                    "700",
                                );
                                engraveParts.push(
                                    buildSvgTextBlock({
                                        textLines: lines,
                                        xMm: pxToMm(
                                            nameRect.left - gridRect.left,
                                        ),
                                        yMm: pxToMm(nameRect.top - gridRect.top),
                                        widthMm: pxToMm(nameRect.width),
                                        fontPx,
                                        fontWeight: "700",
                                        fill: "#000000",
                                    }),
                                );
                            }
                        }

                        if (!toggleLowWaste.checked && toggleStats.checked) {
                            const statEls = Array.from(
                                card.querySelectorAll(".participant-stats div"),
                            );
                            for (const statEl of statEls) {
                                const statRect = statEl.getBoundingClientRect();
                                const statText = stripHtml(
                                    statEl.textContent.trim(),
                                );
                                const fontPx = parseFloat(
                                    window.getComputedStyle(statEl).fontSize,
                                );
                                const lines = wrapSvgText(
                                    statText,
                                    pxToMm(statRect.width),
                                    fontPx,
                                );
                                engraveParts.push(
                                    buildSvgTextBlock({
                                        textLines: lines,
                                        xMm: pxToMm(
                                            statRect.left - gridRect.left,
                                        ),
                                        yMm: pxToMm(statRect.top - gridRect.top),
                                        widthMm: pxToMm(statRect.width),
                                        fontPx,
                                        fill: "#000000",
                                        lineHeightMultiplier: 1.2,
                                    }),
                                );
                            }
                        }
                    }

                    const offsetXmm = pxToMm(-minLeftPx);
                    const offsetYmm = pxToMm(-minTopPx);
                    const svgWidthMm = pxToMm(maxRightPx - minLeftPx);
                    const svgHeightMm = pxToMm(maxBottomPx - minTopPx);

                    const svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink"
    version="1.1"
    width="${formatSvgNumber(svgWidthMm)}mm"
    height="${formatSvgNumber(svgHeightMm)}mm"
    viewBox="0 0 ${formatSvgNumber(svgWidthMm)} ${formatSvgNumber(svgHeightMm)}"
>
    <title>${escapeXml(groupId)} Laser Export</title>
    <desc>Pure red circles in the cut-layer are intended as cut paths. Images and text are in the engrave-layer.</desc>
    <defs>
        ${defs.join("")}
    </defs>
    <g id="engrave-layer" transform="translate(${formatSvgNumber(offsetXmm)} ${formatSvgNumber(offsetYmm)})">
        ${engraveParts.join("")}
    </g>
    <g id="cut-layer" transform="translate(${formatSvgNumber(offsetXmm)} ${formatSvgNumber(offsetYmm)})">
        ${cutParts.join("")}
    </g>
</svg>`;

                    const blob = new Blob([svg], {
                        type: "image/svg+xml;charset=utf-8",
                    });
                    const objectUrl = URL.createObjectURL(blob);
                    const link = document.createElement("a");
                    link.href = objectUrl;
                    link.download = `${groupId.replace(/[^a-z0-9-_]+/gi, "_") || "group"}-laser.svg`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    setTimeout(() => URL.revokeObjectURL(objectUrl), 1000);

                    statusMessage.textContent =
                        "SVG laser export downloaded. Red circles are isolated in the cut-layer.";
                } catch (error) {
                    console.error(error);
                    statusMessage.textContent =
                        "Error creating SVG laser export.";
                }
            }

            groupSelect.addEventListener("change", () => {
                loadParticipantsForGroup(groupSelect.value);
            });

            toggleNames.addEventListener("change", refreshVisibility);
            toggleStats.addEventListener("change", refreshVisibility);
            toggleLowWaste.addEventListener("change", refreshVisibility);

            printBtn.addEventListener("click", () => {
                window.print();
            });

            saveWordBtn.addEventListener("click", () => {
                saveToWord();
            });

            exportSvgBtn.addEventListener("click", () => {
                exportLaserSvg();
            });

            async function init() {
                try {
                    await loadActivityMetadata();
                    await loadGroupIds();
                } catch (error) {
                    console.error(error);
                    groupSelect.innerHTML = `<option value="">Unable to load groups</option>`;
                    statusMessage.textContent =
                        "Error loading activity metadata or group IDs.";
                }
            }

            init();
        </script>
    </body>
</html>
